<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="/style.css">
</head>
<body>
<main class="login-page">
    <section class="login-box">
        <h1>Login</h1>

        <p th:if="${param.error}" style="color: darkred; font-weight: bold; text-align: center;">
            Invalid username or password.
        </p>
        <p th:if="${param.registered}" style="color: #4A7C59; font-weight: bold; text-align: center;">
            Account created successfully! Please log in.
        </p>

        <form method="post" th:action="@{/login}">
            <label>
                Username
                <input type="text" name="username" required>
            </label>

            <label>
                Password
                <input type="password" name="password" required>
            </label>

            <button type="submit">Login</button>
        </form>

        <p>Don't have an account? <a th:href="@{/register}" href="/register">Create account</a></p>
    </section>
</main>
</body>
</html>
