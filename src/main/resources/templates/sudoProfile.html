<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="/style.css">
</head>
<body>

<header>
    <nav>
        <h1><a th:href="@{/sudoHome}">Marketplace</a></h1>
        <ul>
            <li><a th:href="@{/addItem}">Add Item</a></li>
            <li><a th:href="@{/sudoProfile}">Profile</a></li>
            <li><a th:href="@{/orderHistory}">Order History</a></li>
            <li><a th:href="@{/orders}">Orders</a></li>
        </ul>
    </nav>
</header>

<main>
    <h2>Your Profile</h2>

    <div class="centered">
        <div class="basket-items">
            <div class="item">
                <div class="item-info">
                    <h3 th:text="${username}">Username</h3>
                    <p>Account Status: <strong th:text="${role}">ADMIN</strong></p>
                </div>

                <div style="margin-top: 16px;">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn-remove">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
