<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Item</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="/style.css">
</head>
<body>

<header>
    <nav>
        <h1><a th:href="@{/home}">Marketplace</a></h1>
        <ul>
            <li><a th:href="@{/profile}">Profile</a></li>
            <li><a th:href="@{/ordersUser}">Orders</a></li>
            <li><a th:href="@{/basket}">Basket</a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="items">
        <div class="item">
            <a th:href="@{/item/{id}(id=${product.id})}">
                <img th:if="${product.imageUrl != null}"
                     th:src="${product.imageUrl}"
                     th:alt="${product.name}" />
            </a>
        </div>
    </div>

    <div class="centered">
        <!-- product name -->
        <div class="description" style="font-size:1.6rem; font-weight:bold; color:#4A7C59; padding:20px 40px;">
            <span th:text="${product.name}">Product Name</span>
        </div>
    </div>

    <div class="centered">
        <!-- price -->
        <div class="description" style="font-size:1.4rem; font-weight:bold; color:#4A7C59;">
            €<span th:text="${#numbers.formatDecimal(product.price, 1, 2)}">0.00</span>
        </div>
    </div>

    <div class="centered">
        <!-- description -->
        <div class="description" th:text="${product.description}">
            Product description here
        </div>
    </div>

    <div class="centered">
        <div class="addToBasket">
            <form th:action="@{/basket/add/{id}(id=${product.id})}" method="post">
                <button type="submit" class="addToBasket">Add to Basket</button>
            </form>
        </div>
    </div>

    <div class="centered">
        <div class="addToBasket">
            <form th:action="@{/favourites/toggle/{id}(id=${product.id})}" method="post">
                <button type="submit" class="btn-fav"
                        th:classappend="${isFavourited} ? 'favourited'"
                        th:text="${isFavourited} ? '♥ Favourited' : '♡ Favourite'">♡ Favourite</button>
            </form>
        </div>
    </div>
</main>

</body>
</html>
