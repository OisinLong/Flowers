<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Basket</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="/style.css">
</head>
<body>

<!-- Top Navigation -->
<header>
    <nav>
        <h1><a th:href="@{/home}" href="/home">Marketplace</a></h1>

        <ul>
            <li><a th:href="@{/profile}" href="/profile">Profile</a></li>
            <li><a th:href="@{/ordersUser}" href="/ordersUser">Orders</a></li>
            <li><a th:href="@{/basket}" href="/basket">Basket</a></li>
        </ul>
    </nav>
</header>

<main>
    <h2>Your Basket</h2>

    <div class="centered">
        <div class="basket-items">
            <!-- Basket products -->
            <div class="item" th:each="product : ${items}">
                <h3 th:text="${product.name}">Product Name</h3>
                <p th:text="'Price: $' + ${product.price}">Price</p>
            </div>

            <!-- Total -->
            <div class="total">
                <h3>Total: $<span th:text="${total}">0.00</span></h3>
            </div>

            <!-- Checkout -->
            <div class="checkout">
                <a th:href="@{/payment}">Proceed to Payment</a>
            </div>
        </div>
    </div>
</main>



</body>
</html>
