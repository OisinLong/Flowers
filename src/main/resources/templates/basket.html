<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Basket</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="/style.css">
</head>
<body>

<!-- Top Navigation -->
<header>
    <nav>
        <h1><a th:href="@{/home}" href="/home">Marketplace</a></h1>

        <ul>
            <li><a th:href="@{/profile}" href="/profile">Profile</a></li>
            <li><a th:href="@{/ordersUser}" href="/ordersUser">Orders</a></li>
            <li><a th:href="@{/basket}" href="/basket">Basket</a></li>
        </ul>
    </nav>
</header>

<main>
    <h2>Your Basket</h2>

    <div class="centered">
        <div th:if="${items.isEmpty()}" class="empty-msg">
            <p>Your basket is currently empty.</p>
            <a th:href="@{/home}">Go shopping!</a>
        </div>

        <div th:if="${!items.isEmpty()}" class="basket-items">

            <div class="item" th:each="entry : ${items}">
                <div class="item-info">
                    <h3 th:text="${entry.key.name}">Product Name</h3>
                    <p th:text="'Price: €' + ${entry.key.price}">Price</p>
                </div>

                <div class="item-controls">
                    <div class="controls-group">
                        <span class="qty-display">Qty: <strong th:text="${entry.value}">1</strong></span>

                        <form th:action="@{/basket/increment/{id}(id=${entry.key.id})}" method="post" class="qty-form">
                            <button type="submit" class="btn-qty">+</button>
                        </form>

                        <form th:action="@{/basket/decrement/{id}(id=${entry.key.id})}" method="post" class="qty-form">
                            <button type="submit" class="btn-qty">-</button>
                        </form>

                        <form th:action="@{/basket/remove/{id}(id=${entry.key.id})}" method="post" class="remove-form">
                            <button type="submit" class="btn-remove">Remove All</button>
                        </form>

                    </div>


                </div>
            </div>

            <div class="total">
                <h3>Total: €<span th:text="${#numbers.formatDecimal(total, 1, 2)}">0.00</span></h3>
            </div>

            <div class="checkout">
                <a th:href="@{/payment}" class="btn-checkout">Proceed to Payment</a>
            </div>
        </div>
    </div>
</main>



</body>
</html>
