<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Item</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="/style.css">
</head>
<body>

<!-- Top Navigation -->
<header>
    <nav>
        <h1><a th:href="@{/sudoHome}">Marketplace</a></h1>
        <ul>
            <li><a th:href="@{/addItem}">Add Item</a></li>
            <li><a th:href="@{/sudoProfile}">Profile</a></li>
            <li><a th:href="@{/orderHistory}">Order History</a></li>
            <li><a th:href="@{/orders}">Orders</a></li>
        </ul>
    </nav>
</header>

<main>
    <!-- Image preview (prefilled with the product's current image) -->
    <div class="items">
        <div class="item" id="preview-card">
            <img id="preview-img"
                 th:src="${product.imageUrl}"
                 th:alt="${product.name}"
                 th:style="${product.imageUrl != null ? '' : 'display:none;'}" />
            <p id="preview-placeholder"
               th:style="${product.imageUrl != null ? 'display:none;' : ''}"
               style="color:#A3C4A8;">Image preview</p>
        </div>
    </div>

    <!-- Form prefilled with existing product values -->
    <div class="centered">
        <div class="description">
            <form th:action="@{/editItem/{id}(id=${product.id})}" method="post"
                  style="display:flex; flex-direction:column; gap:12px; text-align:left;">

                <!-- Name -->
                <label for="name" style="font-weight:bold; color:#4A7C59;">Name</label>
                <input type="text" id="name" name="name" required
                       th:value="${product.name}"
                       style="padding:8px; border:1px solid #A3C4A8; border-radius:4px; font-family:inherit;" />

                <!-- Price -->
                <label for="price" style="font-weight:bold; color:#4A7C59;">Price (€)</label>
                <input type="number" id="price" name="price" step="0.01" min="0" required
                       th:value="${product.price}"
                       style="padding:8px; border:1px solid #A3C4A8; border-radius:4px; font-family:inherit;" />

                <!-- Description -->
                <label for="description" style="font-weight:bold; color:#4A7C59;">Description</label>
                <textarea id="description" name="description" rows="4" required
                          th:text="${product.description}"
                          style="padding:8px; border:1px solid #A3C4A8; border-radius:4px; font-family:inherit; resize:vertical;"></textarea>

                <!-- Image dropdown (current image pre-selected) -->
                <label for="imageFilename" style="font-weight:bold; color:#4A7C59;">Image</label>
                <select id="imageFilename" name="imageFilename" required
                        onchange="updatePreview(this.value)"
                        style="padding:8px; border:1px solid #A3C4A8; border-radius:4px; font-family:inherit;">
                    <option value="" disabled>-- Select an image --</option>
                    <option th:each="img : ${images}"
                            th:value="${img}"
                            th:text="${img}"
                            th:selected="${product.imageUrl != null and img == #strings.substringAfter(product.imageUrl, '/images/')}">
                    </option>
                </select>

                <!-- Submit -->
                <button type="submit" class="addToBasket"
                        style="margin-top:8px;">Save Changes</button>
            </form>

            <!-- Delete form — separate so it doesn't interfere with the edit POST -->
            <form th:action="@{/deleteItem/{id}(id=${product.id})}" method="post"
                  onsubmit="return confirm('Are you sure you want to delete this product? This cannot be undone.');"
                  style="margin-top:10px;">
                <button type="submit" class="btn-remove" style="width:100%; padding:12px;">
                    Remove Product
                </button>
            </form>
        </div>
    </div>
</main>

<!-- Live image preview when a different image is selected -->
<script>
    function updatePreview(filename) {
        var img = document.getElementById('preview-img');
        var placeholder = document.getElementById('preview-placeholder');
        if (filename) {
            img.src = '/images/' + filename;
            img.style.display = 'block';
            placeholder.style.display = 'none';
        } else {
            img.style.display = 'none';
            placeholder.style.display = 'block';
        }
    }
</script>

</body>
</html>
