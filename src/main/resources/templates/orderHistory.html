<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="/style.css">
</head>
<body>

<!-- Top Navigation -->
<header>
    <nav>
        <h1><a th:href="@{/sudoHome}" href="/sudoHome">Marketplace</a></h1>

        <ul>
            <li><a th:href="@{/addItem}" href="/addItem">Add Item</a></li>
            <li><a th:href="@{/sudoProfile}" href="/sudoProfile">Profile</a></li>
            <li><a th:href="@{/orderHistory}" href="/orderHistory">Order History</a></li>
            <li><a th:href="@{/orders}" href="/orders">Orders</a></li>
        </ul>
    </nav>
</header>

<!-- Main Content -->
<main>
    <h2>Order History</h2>

    <!-- Total Revenue Counter -->
    <div class="centered">
        <p style="font-size: 1.3rem; font-weight: bold; color: #4A7C59;">
            Total Revenue: €<span th:text="${#numbers.formatDecimal(totalRevenue, 1, 2)}">0.00</span>
        </p>
    </div>

    <div class="centered">
        <!-- Empty state -->
        <div th:if="${orders == null || orders.isEmpty()}" class="empty-msg">
            <p>No delivered orders yet.</p>
        </div>

        <!-- Orders list -->
        <div th:if="${orders != null && !orders.isEmpty()}" class="basket-items">
            <div class="item" th:each="order : ${orders}">
                <div class="item-info">
                    <h3 th:text="'Order #' + ${order.id}">Order #001</h3>
                    <p><strong>User:</strong> <span th:text="${order.username}">username</span></p>
                    <p th:text="${#temporals.format(order.orderDate, 'dd MMMM yyyy HH:mm')}">Date</p>
                    <p><strong>Status:</strong> <span th:text="${order.status}">Delivered</span></p>

                    <!-- Order items breakdown (shows priceAtPurchase, proving historical prices are retained) -->
                    <div style="margin-top:8px; text-align:left; font-size:0.85rem;">
                        <p th:each="oi : ${order.items}">
                            <span th:text="${oi.productName}">Item</span>
                            × <span th:text="${oi.quantity}">1</span>
                            — €<span th:text="${#numbers.formatDecimal(oi.priceAtPurchase, 1, 2)}">0.00</span> each
                        </p>
                    </div>
                </div>
                <div class="item-controls">
                    <div class="controls-group">
                        <span class="qty-display">Total: <strong th:text="'€' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}">€0.00</strong></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
