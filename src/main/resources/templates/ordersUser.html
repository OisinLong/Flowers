<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Orders</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="/style.css">
</head>
<body>

<!-- Top Navigation -->
<header>
    <nav>
        <h1><a th:href="@{/home}" href="/home">Marketplace</a></h1>

        <ul>
            <li><a th:href="@{/profile}" href="/profile">Profile</a></li>
            <li><a th:href="@{/ordersUser}" href="/ordersUser">Orders</a></li>
            <li><a th:href="@{/basket}" href="/basket">Basket</a></li>
        </ul>
    </nav>
</header>

<main>
    <h2>Your Orders</h2>

    <div class="centered">
        <div th:if="${orders == null || orders.isEmpty()}" class="empty-msg">
            <p>You haven't placed any orders yet.</p>
            <a th:href="@{/home}">Go shopping!</a>
        </div>

        <div th:if="${orders != null && !orders.isEmpty()}" class="basket-items">
            <!-- Each order as a single item -->
            <div class="item" th:each="order : ${orders}">
                <div class="item-info">
                    <h3 th:text="'Order #' + ${order.id}">Order #001</h3>
                    <p th:text="${#temporals.format(order.orderDate, 'dd MMMM yyyy HH:mm')}">Date</p>
                    <p th:text="'Status: ' + ${order.status}">Order Status</p>

                    <p th:text="${#lists.size(order.items)} + ' items'">3 items</p>
                </div>

                <div class="item-controls">
                    <div class="controls-group">
                        <span class="qty-display">Total: <strong th:text="'$' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}">$0.00</strong></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
