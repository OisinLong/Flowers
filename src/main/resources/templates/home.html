<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Marketplace</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<header>
    <nav>
        <h1><a th:href="@{/home}">Marketplace</a></h1>
        <ul>
            <li><a th:href="@{/profile}">Profile</a></li>
            <li><a th:href="@{/ordersUser}">Orders</a></li>
            <li><a th:href="@{/basket}">Basket</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="items">
        <!-- Loop through products -->
        <div class="item" th:each="product : ${products}">
            <a th:href="@{/item/{id}(id=${product.id})}" th:text="${product.name}">Product Name</a>
        </div>
    </section>
</main>


</body>
</html>
