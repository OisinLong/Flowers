<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="/style.css">
</head>
<body>

<!-- Top Navigation -->
<header>
    <nav>
        <h1><a th:href="@{/home}" href="/home">Marketplace</a></h1>

        <ul>
            <li><a th:href="@{/profile}" href="/profile">Profile</a></li>
            <li><a th:href="@{/ordersUser}" href="/ordersUser">Orders</a></li>
            <li><a th:href="@{/basket}" href="/basket">Basket</a></li>
        </ul>
    </nav>
</header>

<!-- Main Content -->
<main>
    <div class="payment-container">
        <h2>Confirm Your Payment</h2>
        <p>Total Amount: <strong th:text="'€' + ${#numbers.formatDecimal(total, 1, 2)}">€0.00</strong></p>

        <form th:action="@{/payment/confirm}" method="post">
            <button type="submit" class="btn-pay">Confirm and Pay</button>
        </form>

        <a th:href="@{/basket}" class="btn-cancel">Back to Basket</a>
    </div>
</main>

</body>
</html>
