<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="/style.css">
</head>
<body>

<!-- Top Navigation -->
<header>
    <nav>
        <h1><a th:href="@{/sudoHome}" href="/sudoHome">Marketplace</a></h1>

        <ul>
            <li><a th:href="@{/addItem}" href="/addItem">Add Item</a></li>
            <li><a th:href="@{/profile}" href="/profile">Profile</a></li>
            <li><a th:href="@{/orderHistory}" href="/orderHistory">Order History</a></li>
            <li><a th:href="@{/orders}" href="/orders">Orders</a></li>
        </ul>
    </nav>
</header>

<!-- Main Content -->
<main>
    <section class="items">
        <div class="item" th:each="product : ${products}">
            <a th:href="@{/editItem/{id}(id=${product.id})}">
                <img th:if="${product.imageUrl != null}"
                     th:src="${product.imageUrl}"
                     th:alt="${product.name}" />
            </a>
        </div>
    </section>
</main>

</body>
</html>
