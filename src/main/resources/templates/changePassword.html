<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="/style.css">
</head>
<body>

<header>
    <nav>
        <h1><a th:href="@{/home}" href="/home">Marketplace</a></h1>

        <ul>
            <li><a th:href="@{/profile}" href="/profile">Profile</a></li>
            <li><a th:href="@{/ordersUser}" href="/ordersUser">Orders</a></li>
            <li><a th:href="@{/basket}" href="/basket">Basket</a></li>
        </ul>
    </nav>
</header>

<main>
    <h2>Change Password</h2>

    <div class="centered">
        <!-- Success message -->
        <p th:if="${param.pwSuccess}" style="color: #4A7C59; font-weight: bold; grid-column: 2; text-align: center;">
            Password changed successfully!
        </p>
        <!-- Error: passwords don't match -->
        <p th:if="${param.pwError != null && param.pwError[0] == 'mismatch'}" style="color: darkred; font-weight: bold; grid-column: 2; text-align: center;">
            New passwords do not match.
        </p>
        <!-- Error: wrong current password -->
        <p th:if="${param.pwError != null && param.pwError[0] == 'wrong'}" style="color: darkred; font-weight: bold; grid-column: 2; text-align: center;">
            Current password is incorrect.
        </p>

        <form th:action="@{/changePassword}" method="post" class="password-form" style="grid-column: 2;">
            <label for="currentPassword">Current Password</label>
            <input type="password" id="currentPassword" name="currentPassword" required>

            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" name="newPassword" required>

            <label for="confirmPassword">Confirm New Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required>

            <button type="submit">Update Password</button>
        </form>
    </div>
</main>

</body>
</html>
